# TokyoNight colors for Tmux

set -g history-limit 100000
set -g default-terminal "tmux-256color"
set-option -g default-shell $SHELL

# true color + undercurl (tmux 3.2+)
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"

# responsive <Esc> in vim, plus autoread/gitgutter integration
set -sg escape-time 10
set -g focus-events on

# 0-indexed windows/panes, auto-renumber on close
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# enable osc52
set -g set-clipboard on
set-option -g allow-passthrough on

setw -g mouse on

set -g mode-style "fg=#7aa2f7,bg=#3b4261"
set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#7aa2f7,bg=#1f2335"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#15161E,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1f2335,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]#[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d  %I:%M %p #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#15161E,bg=#7aa2f7,bold] #h "

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-format "#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #F #[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]"


# main prefix: Control-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# select panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# repeatable resize (hold prefix, tap repeatedly)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# swap windows left/right, keeping focus
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# vim mode copy-paste
setw -g mode-keys vi
bind [ copy-mode
bind P paste-buffer
bind p previous-window
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
